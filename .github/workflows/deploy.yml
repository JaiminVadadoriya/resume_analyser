name: CI/CD — Build, Test & Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Grant GITHUB_TOKEN the permissions required to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skip queued ones
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────
  # JOB 1: Lint + Test (runs on PRs & pushes)
  # ─────────────────────────────────────
  ci:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Angular 22 requires Node.js >= 22.22.3
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.3'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Unit Tests (Vitest)
        run: npm test

  # ─────────────────────────────────────
  # JOB 2: Build for GitHub Pages (push to main only)
  # ─────────────────────────────────────
  build:
    name: Build Angular App
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.3'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download TF model assets (if not tracked in git)
        run: |
          MODEL_DIR="public/models/use-lite"
          if [ ! -f "$MODEL_DIR/model.json" ]; then
            echo "Downloading USE Lite model from TFHub..."
            mkdir -p "$MODEL_DIR"
            curl -fSL "https://tfhub.dev/tensorflow/tfjs-model/universal-sentence-encoder-lite/1/default/1/model.json?tfjs-format=file" \
              -o "$MODEL_DIR/model.json"
            node -e "
              const fs = require('fs');
              const model = JSON.parse(fs.readFileSync('$MODEL_DIR/model.json', 'utf8'));
              const shards = model.weightsManifest.flatMap(g => g.paths);
              console.log(shards.join('\n'));
            " | while IFS= read -r shard; do
              curl -fSL "https://tfhub.dev/tensorflow/tfjs-model/universal-sentence-encoder-lite/1/default/1/${shard}?tfjs-format=file" \
                -o "$MODEL_DIR/${shard}"
              echo "Downloaded: ${shard}"
            done
            curl -fSL "https://storage.googleapis.com/tfjs-models/savedmodel/universal_sentence_encoder/vocab.json" \
              -o "$MODEL_DIR/vocab.json"
            echo "All model assets ready."
          else
            echo "Model files already present."
          fi

      - name: Build Angular (production, base-href for GitHub Pages)
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          npx ng build --configuration production --base-href "/${REPO_NAME}/"

      - name: Add .nojekyll to prevent Jekyll processing
        run: touch dist/resume-analyser/browser/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/resume-analyser/browser

  # ─────────────────────────────────────
  # JOB 3: Deploy to GitHub Pages
  # ─────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
